name: Publish image to GHCR

on:
  push:
    branches: [main]
    paths: ["app/**"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ynov-cloud" >> "$GITHUB_ENV"

      - name: Read version
        id: version
        run: echo "value=$(node -p "require('./app/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Validate required variables
        run: |
          [[ -n "$IMAGE" ]] || { echo "::error::IMAGE is empty"; exit 1; }
          [[ "$IMAGE" == "$( echo "$IMAGE" | tr '[:upper:]' '[:lower:]' )" ]] || { echo "::error::IMAGE contains uppercase: $IMAGE"; exit 1; }
          [[ -n "${{ steps.version.outputs.value }}" ]] || { echo "::error::version not found in app/package.json"; exit 1; }
          echo "IMAGE=$IMAGE"
          echo "VERSION=${{ steps.version.outputs.value }}"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./app
          target: prod
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:v${{ steps.version.outputs.value }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
