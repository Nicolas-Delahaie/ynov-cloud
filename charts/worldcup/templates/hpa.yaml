apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worldcup-hpa
  labels:
    app: worldcup-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worldcup-app
  minReplicas: {{ .Values.hpa.minReplicas }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.cpuTargetPercent }}
