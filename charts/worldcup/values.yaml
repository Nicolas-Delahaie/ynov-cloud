image:
  repository: ghcr.io/nicolas-delahaie/ynov-cloud
  tag: "v1.0.0"
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  port: 3000

ingress:
  host: ""  # Obligatoire : --set ingress.host=<IP>.nip.io

db:
  host: worldcup-postgres
  port: 5432
  user: postgres
  password: ""  # Obligatoire : --set db.password=<MOT_DE_PASSE>
  name: worldcup2026

hpa:
  minReplicas: 2
  maxReplicas: 6
  cpuTargetPercent: 60

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"
