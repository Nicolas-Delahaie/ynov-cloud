image:
  repository: ghcr.io/nicolas-delahaie/ynov-cloud
  tag: ""  # Obligatoire: --set image.tag=<git-tag>
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  port: 3000

ingress:
  host: "178.170.25.230.nip.io"

db:
  host: worldcup-postgres
  port: 5432
  image: postgres:15-alpine
  user: postgres
  password: ""  # Obligatoire : --set db.password=<MOT_DE_PASSE>
  name: worldcup2026

hpa:
  minReplicas: 2
  maxReplicas: 6
  cpuTargetPercent: 60

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# Observabilité (bloc 4)
# Active le ServiceMonitor + PrometheusRule. Nécessite les CRD du Prometheus
# Operator (installés par kube-prometheus-stack). Voir docs/bloc4-observabilite.md.
monitoring:
  enabled: true
  # Intervalle de scrape de /metrics par Prometheus
  scrapeInterval: 15s
  # Label ajouté au ServiceMonitor/PrometheusRule pour que Prometheus les sélectionne
  releaseLabel: kube-prometheus-stack
  alerts:
    # Seuil de latence p95 (secondes) au-delà duquel on alerte
    latencyP95Seconds: 1
    # Seuil de taux d'erreurs 5xx (ratio) au-delà duquel on alerte
    error5xxRatio: 0.05
